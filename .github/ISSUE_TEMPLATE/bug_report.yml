name: Bug report
description: Report something that is broken or confusing in Cowart.
title: "[Bug]: "
labels: [bug]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the smallest steps that reproduce the issue.
      placeholder: |
        1. Open Cowart...
        2. Select...
        3. Run...
    validations:
      required: true
  - type: input
    id: node
    attributes:
      label: Node.js version
      placeholder: v22.12.0
  - type: textarea
    id: checks
    attributes:
      label: Verification output
      description: Paste relevant `npm run check` output if available.
      render: shell
